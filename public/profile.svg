<svg xmlns="http://www.w3.org/2000/svg" width="600" height="800" viewBox="0 0 600 800">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628"/>
      <stop offset="100%" style="stop-color:#1a2d50"/>
    </linearGradient>
    <linearGradient id="skin" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f4d0a8"/>
      <stop offset="100%" style="stop-color:#e8b888"/>
    </linearGradient>
    <linearGradient id="hair" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#0d0d1a"/>
    </linearGradient>
    <linearGradient id="hoodie" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e293b"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="40%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:0"/>
    </radialGradient>
  </defs>
  <!-- Background -->
  <rect width="600" height="800" fill="url(#bg)"/>
  <circle cx="300" cy="300" r="350" fill="url(#glow)"/>
  
  <!-- Body / Hoodie -->
  <ellipse cx="300" cy="720" rx="220" ry="160" fill="url(#hoodie)"/>
  <ellipse cx="300" cy="650" rx="160" ry="80" fill="url(#hoodie)"/>
  
  <!-- Neck -->
  <rect x="270" y="480" width="60" height="80" fill="url(#skin)" rx="20"/>
  
  <!-- Face -->
  <ellipse cx="300" cy="350" rx="130" ry="160" fill="url(#skin)"/>
  
  <!-- Hair -->
  <ellipse cx="300" cy="260" rx="145" ry="130" fill="url(#hair)"/>
  <ellipse cx="200" cy="320" rx="40" ry="80" fill="url(#hair)"/>
  <ellipse cx="400" cy="320" rx="40" ry="80" fill="url(#hair)"/>
  <!-- Fringe -->
  <path d="M180 280 Q220 200 300 210 Q380 200 420 280 Q380 230 300 240 Q220 230 180 280Z" fill="url(#hair)"/>
  <path d="M170 310 Q200 250 260 260 L220 330Z" fill="url(#hair)"/>
  
  <!-- Eyes -->
  <ellipse cx="260" cy="370" rx="18" ry="12" fill="#1a1a2e"/>
  <ellipse cx="340" cy="370" rx="18" ry="12" fill="#1a1a2e"/>
  <circle cx="264" cy="368" r="4" fill="white" opacity="0.8"/>
  <circle cx="344" cy="368" r="4" fill="white" opacity="0.8"/>
  
  <!-- Eyebrows -->
  <path d="M238 348 Q260 338 280 345" stroke="#1a1a2e" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  <path d="M320 345 Q340 338 362 348" stroke="#1a1a2e" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  
  <!-- Nose -->
  <path d="M295 390 Q300 405 305 390" stroke="#d4a574" stroke-width="2" fill="none"/>
  
  <!-- Mouth -->
  <path d="M275 425 Q300 438 325 425" stroke="#c08060" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  
  <!-- Ears -->
  <ellipse cx="170" cy="370" rx="18" ry="28" fill="url(#skin)"/>
  <ellipse cx="430" cy="370" rx="18" ry="28" fill="url(#skin)"/>
  
  <!-- Hoodie collar -->
  <path d="M220 560 Q300 600 380 560 Q360 530 300 540 Q240 530 220 560Z" fill="#263550"/>
  
  <!-- Blue accent light -->
  <ellipse cx="180" cy="400" rx="80" ry="120" fill="#3b82f6" opacity="0.04"/>
</svg>
